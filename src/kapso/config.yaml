# Generic Problem Runner Configuration
# Configuration for solving arbitrary problems
#
# Usage:
#   python -m kapso.runner -p "Your problem..." -m GENERIC
#   python -m kapso.runner -f problem.txt -m MINIMAL
#
# Available Search Strategies:
#   - generic: Claude Code + MCP gates for ideation and implementation
#   - benchmark_tree_search: Tree search with handler.run() for benchmarks
#
# Knowledge Search Backends (via KnowledgeSearchFactory):
#   - kg_graph_search: Weaviate embeddings + Neo4j graph (for wiki pages)
#   - kg_llm_navigation: Neo4j KG with LLM-guided navigation (for JSON KG)
#
# Experiment History:
#   - Stored in .kapso/experiment_history.json
#   - Accessed via MCP tools (get_top_experiments, get_recent_experiments, search_similar_experiments)
#   - Optionally indexed in Weaviate for semantic search (set WEAVIATE_URL env var)

# Default mode to use
default_mode: GENERIC

# One shared source for evidence-directed ideation operating parameters.
ideation_defaults: &ideation_defaults
  archive_path: ".kapso/idea_archive.json"
  evidence:
    minimum_repeat_measurements: 2
    minimum_credible_delta: 0.01
    surprising_gain_multiplier: 3.0
    proxy_divergence_threshold: 0.03
    plateau_window: 3
    diversity_window: 4
    gap_debt_threshold: 2
  gaps:
    default_evidence_confidence: 0.25
    default_uncertainty_reduction: 0.25
    default_cost: 1.0
    minimum_cost: 0.01
  operators:
    candidate_quota: 2
    repair_quota: 1
    reserve_gap_slot: true
  coding_agents:
    artifact_path: ".kapso/ideation/agent_calls"
    termination_grace_seconds: 5
    generator:
      members:
        - cli: "codex"
          model: "gpt-5.6"
          timeout_seconds: 300
          effort: "high"
          allowed_tools: ["Read", "WebSearch"]
        - cli: "claude_code"
          model: "us.anthropic.claude-opus-4-6-v1"
          timeout_seconds: 300
          effort: "high"
          allowed_tools: ["Read", "Glob", "Grep", "WebSearch"]
      repair_member:
        cli: "codex"
        model: "gpt-5.6"
        timeout_seconds: 300
        effort: "high"
        allowed_tools: ["Read", "WebSearch"]
    selector:
      cli: "codex"
      model: "gpt-5.6"
      timeout_seconds: 300
      effort: "high"
      allowed_tools: ["Read"]
  embeddings:
    enabled: true
    model: "text-embedding-3-small"
    dimensions: 1536
    timeout_seconds: 30
    max_retries: 0
  analyzer:
    semantic_similarity_threshold: 0.92
    max_neighbors: 5
    minimum_distinct_eligible: 2

# =============================================================================
# Available configuration modes
# =============================================================================
modes:
  # ===========================================
  # Production Mode
  # ===========================================
  
  # Standard configuration for generic problems
  # Uses Claude Code with MCP gates for ideation and implementation
  GENERIC:
    ideation: *ideation_defaults
    search_strategy:
      type: "generic"
      params:
        idea_generation_model: "us.anthropic.claude-opus-4-6-v1"
        implementation_model: "us.anthropic.claude-opus-4-6-v1"
        auth_mode: "bedrock"
        gate_failure_policy: "warn"
        aws_region: "us-east-1"
        ideation_timeout: 300
        implementation_timeout: 600
        ideation_gates: ["research", "experiment_history", "repo_memory", "leeroopedia"]
        implementation_gates: ["research", "repo_memory", "leeroopedia"]

    models:
      utility: "gpt-4.1-mini"
      reasoning: "gpt-5-mini"
      web_search: "openai/gpt-4o-search-preview"
    retry:
      max_attempts: 2
      initial_delay_seconds: 5
      max_delay_seconds: 60
      multiplier: 2
      jitter: true
    
    coding_agent:
      type: "claude_code"
      model: "us.anthropic.claude-opus-4-6-v1"
      debug_model: "us.anthropic.claude-opus-4-6-v1"
      agent_specific:
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        streaming: true
        timeout: 600
    
    feedback_generator:
      type: "claude_code"
      model: "us.anthropic.claude-opus-4-6-v1"
      debug_model: "us.anthropic.claude-opus-4-6-v1"
      agent_specific:
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        streaming: true
        timeout: 120
    
    # Knowledge search configuration
    # All model/collection details are in knowledge_search.yaml presets.
    # Use index_kg() to index data, then pass kg_index to Kapso.
    knowledge_search:
      type: "kg_graph_search"
      enabled: true
      preset: "DEFAULT"
    
    # Learner configuration for kapso.learn()
    learner:
      ingestor:
        model: "us.anthropic.claude-opus-4-6-v1"
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        timeout: 1800
        cleanup: true
        cleanup_staging: false
        fail_on_validation_errors: true
        github_repo_visibility: "private"
      merger:
        model: "us.anthropic.claude-opus-4-6-v1"
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        timeout: 3600

  # ===========================================
  # Testing Modes
  # ===========================================
  
  # Minimal configuration for quick testing
  MINIMAL:
    ideation: *ideation_defaults
    search_strategy:
      type: "generic"
      params:
        idea_generation_model: "us.anthropic.claude-opus-4-6-v1"
        implementation_model: "us.anthropic.claude-opus-4-6-v1"
        auth_mode: "bedrock"
        gate_failure_policy: "warn"
        aws_region: "us-east-1"
        ideation_timeout: 180
        implementation_timeout: 300
        ideation_gates: ["research", "experiment_history", "repo_memory", "leeroopedia"]
        implementation_gates: ["research", "repo_memory", "leeroopedia"]

    models:
      utility: "gpt-4.1-mini"
      reasoning: "gpt-5-mini"
      web_search: "openai/gpt-4o-search-preview"
    retry:
      max_attempts: 2
      initial_delay_seconds: 5
      max_delay_seconds: 60
      multiplier: 2
      jitter: true
    
    coding_agent:
      type: "claude_code"
      model: "us.anthropic.claude-opus-4-6-v1"
      debug_model: "us.anthropic.claude-opus-4-6-v1"
      agent_specific:
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        streaming: true
        timeout: 120
    
    feedback_generator:
      type: "claude_code"
      model: "us.anthropic.claude-opus-4-6-v1"
      debug_model: "us.anthropic.claude-opus-4-6-v1"
      agent_specific:
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        streaming: true
        timeout: 120
    
    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false
    
    # Learner configuration for kapso.learn()
    learner:
      ingestor:
        model: "us.anthropic.claude-opus-4-6-v1"
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        timeout: 600
        cleanup: true
        cleanup_staging: false
        fail_on_validation_errors: true
        github_repo_visibility: "private"
      merger:
        model: "us.anthropic.claude-opus-4-6-v1"
        auth_mode: "bedrock"
        aws_region: "us-east-1"
        timeout: 1800
