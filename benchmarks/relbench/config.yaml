# RelBench Configuration
#
# Search strategy: benchmark_tree_search (handler-scored tree search).
# The handler computes official validation metrics as the search score and
# keeps test metrics private until final_evaluate.
#
# Notes specific to RelBench:
# - experimentation_per_run MUST stay 1: each evaluation is a long training
#   run and the handler serializes executions (shared GPU + shared eval dir).
# - Knowledge reaches ideation through the handler's problem context (schema,
#   SOTA table, playbooks); the KG backend is optional extra.

default_mode: RELBENCH_CONFIGS

modes:
  # ===========================================
  # Production configuration
  # ===========================================
  RELBENCH_CONFIGS:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        # reasoning_effort applies to ideation, selection, and pruning calls.
        reasoning_effort: "xhigh"
        code_debug_tries: 10
        node_expansion_limit: 2
        node_expansion_new_childs_count: 5
        idea_generation_steps: 2
        first_experiment_factor: 1
        experimentation_per_run: 1
        per_step_maximum_solution_count: 10
        exploration_budget_percent: 40
        # Selection + pruning use idea_generation_model; ideation generates
        # with EVERY ensemble model and pools the solutions. The Opus leg
        # routes through AWS Bedrock (auth: AWS_BEARER_TOKEN_BEDROCK +
        # AWS_REGION in the environment; litellm reads the bearer token
        # natively for bedrock/ model routes).
        idea_generation_model: "gpt-5.6-sol"
        idea_generation_ensemble_models:
          - "gpt-5.6-sol"
          - "bedrock/us.anthropic.claude-opus-4-8"

    # claude_code executes and self-tests code during implementation (safe:
    # the handler exports the sanitized cache env process-wide). auth_mode
    # oauth pins the agent to the CLI login (subscription); to bill the agent
    # through Bedrock as well, switch to auth_mode: "bedrock" and model
    # "us.anthropic.claude-opus-4-8-v1" (uses AWS_BEARER_TOKEN_BEDROCK).
    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-8"
      agent_specific:
        effort: "xhigh"
        auth_mode: "oauth"

    # Role routes for everything that asks for a role rather than a model.
    # Repo memory uses the `utility` role (RepoMemoryManager.DEFAULT_REPO_MODEL_LLM).
    # Note: repo-memory call sites do not plumb a reasoning-effort parameter;
    # the model applies, provider-default effort is used there.
    models:
      utility: "gpt-5.6-luna"
      reasoning: "gpt-5.6-sol"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false

  # Heavier ideation for the hardest tasks (big rec tasks, soft v2 tasks).
  HEAVY_EXPERIMENTATION:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        reasoning_effort: "high"
        code_debug_tries: 10
        node_expansion_limit: 3
        node_expansion_new_childs_count: 8
        idea_generation_steps: 2
        first_experiment_factor: 2
        experimentation_per_run: 1
        per_step_maximum_solution_count: 12
        exploration_budget_percent: 50
        idea_generation_model: "gpt-5"
        idea_generation_ensemble_models:
          - "gpt-5"
          - "gpt-5"
          - "o4-mini"

    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-5"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false

  # Fast system-debugging loop: production mechanics (claude_code coder,
  # same contracts/handler) at ~5x lower latency. Pair with a tiny task,
  # e.g.: -s rel-f1 -t driver-circuit-compete (27-row val/test, seconds-fast
  # evals). Iterations ~15-20 min instead of ~90.
  FAST_DEBUG:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        reasoning_effort: "medium"
        code_debug_tries: 5
        node_expansion_limit: 2
        node_expansion_new_childs_count: 3
        idea_generation_steps: 1
        first_experiment_factor: 1
        experimentation_per_run: 1
        per_step_maximum_solution_count: 6
        exploration_budget_percent: 40
        idea_generation_model: "gpt-5.6-sol"
        idea_generation_ensemble_models:
          - "gpt-5.6-sol"

    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-8"
      agent_specific:
        effort: "medium"
        auth_mode: "oauth"

    models:
      utility: "gpt-5.6-luna"
      reasoning: "gpt-5.6-sol"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false

  # ===========================================
  # Quick smoke testing (rel-f1 scale)
  # ===========================================
  MINIMAL:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        reasoning_effort: "medium"
        code_debug_tries: 2
        node_expansion_limit: 2
        node_expansion_new_childs_count: 3
        idea_generation_steps: 1
        first_experiment_factor: 1
        experimentation_per_run: 1
        per_step_maximum_solution_count: 6
        exploration_budget_percent: 50
        idea_generation_model: "gpt-4.1-mini"
        idea_generation_ensemble_models:
          - "gpt-4.1-mini"

    coding_agent:
      type: "aider"
      model: "gpt-4.1-mini"
      debug_model: "gpt-4.1-mini"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false
