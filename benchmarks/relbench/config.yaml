# RelBench Configuration
#
# Search strategy: benchmark_tree_search (handler-scored tree search).
# The handler computes official validation metrics as the search score and
# keeps test metrics private until final_evaluate.
#
# Notes specific to RelBench:
# - experimentation_per_run MUST stay 1: each evaluation is a long training
#   run and the handler serializes executions (shared GPU + shared eval dir).
# - Knowledge reaches ideation through the handler's problem context (schema,
#   SOTA table, playbooks); the KG backend is optional extra.

default_mode: RELBENCH_CONFIGS

modes:
  # ===========================================
  # Production configuration
  # ===========================================
  RELBENCH_CONFIGS:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        # reasoning_effort applies to ideation, selection, and pruning calls.
        reasoning_effort: "xhigh"
        code_debug_tries: 10
        node_expansion_limit: 2
        node_expansion_new_childs_count: 5
        idea_generation_steps: 2
        first_experiment_factor: 1
        experimentation_per_run: 1
        per_step_maximum_solution_count: 10
        exploration_budget_percent: 40
        # Selection + pruning use idea_generation_model; ideation generates
        # with EVERY ensemble model and pools the solutions. The Opus leg
        # routes through AWS Bedrock (auth: AWS_BEARER_TOKEN_BEDROCK +
        # AWS_REGION in the environment; litellm reads the bearer token
        # natively for bedrock/ model routes).
        idea_generation_model: "gpt-5.6-sol"
        idea_generation_ensemble_models:
          - "gpt-5.6-sol"
          - "bedrock/us.anthropic.claude-opus-4-8"

    # claude_code executes and self-tests code during implementation (safe:
    # the handler exports the sanitized cache env process-wide). auth_mode
    # oauth pins the agent to the CLI login (subscription); to bill the agent
    # through Bedrock as well, switch to auth_mode: "bedrock" and model
    # "us.anthropic.claude-opus-4-8-v1" (uses AWS_BEARER_TOKEN_BEDROCK).
    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-8"
      agent_specific:
        effort: "xhigh"
        auth_mode: "oauth"

    # Role routes for everything that asks for a role rather than a model.
    # Repo memory uses the `utility` role (RepoMemoryManager.DEFAULT_REPO_MODEL_LLM).
    # Note: repo-memory call sites do not plumb a reasoning-effort parameter;
    # the model applies, provider-default effort is used there.
    models:
      utility: "gpt-5.6-luna"
      reasoning: "gpt-5.6-sol"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false

  # Heavier ideation for the hardest tasks (big rec tasks, soft v2 tasks).
  HEAVY_EXPERIMENTATION:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        reasoning_effort: "high"
        code_debug_tries: 10
        node_expansion_limit: 3
        node_expansion_new_childs_count: 8
        idea_generation_steps: 2
        first_experiment_factor: 2
        experimentation_per_run: 1
        per_step_maximum_solution_count: 12
        exploration_budget_percent: 50
        idea_generation_model: "gpt-5"
        idea_generation_ensemble_models:
          - "gpt-5"
          - "gpt-5"
          - "o4-mini"

    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-5"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false

  # Generic-search mode (escalations / A-B vs the tree): code-reading agentic
  # ideation, champion-chain parent policy, evaluation through the
  # maintainer-registered entrypoint wrapping our provided grader
  # (data/generic_eval — official val scoring only; test physically
  # unscorable in-loop). Runner wires eval_dir when --strategy generic.
  RELBENCH_GENERIC:
    search_strategy:
      type: "generic"
      params:
        idea_generation_model: "claude-opus-4-8"
        implementation_model: "claude-opus-4-8"
        auth_mode: "oauth"
        effort: "xhigh"
        gate_failure_policy: "skip"
        parent_policy: "best"
        ideation_timeout: 1800
        # One experiment = implement + run the registered full evaluation
        # (candidate training, up to the task's full timeout) inside the
        # session: cap must cover both.
        implementation_timeout: 10800
        ideation_gates: ["experiment_history", "repo_memory"]
        implementation_gates: ["repo_memory"]
        # Ensemble ideation mirroring the posttrain deployment: parallel CLI
        # members with complementary lenses + a selector-critic. The codex
        # member authenticates via ~/.codex/auth.json (ChatGPT login), the
        # claude members via CLAUDE_CODE_OAUTH_TOKEN.
        ideation_ensemble:
          - cli: "codex"
            model: "gpt-5.6-sol"
            effort: "xhigh"
            lens: "temporal feature engineering & leakage-safe relational aggregation first"
          - cli: "claude_code"
            model: "claude-fable-5"
            effort: "xhigh"
            lens: "model class, learning objective & val->test distribution shift first"
        ideation_selector:
          cli: "claude_code"
          model: "claude-fable-5"
          effort: "xhigh"

    evaluation_maintainer:
      type: "claude_code"
      model: "claude-opus-4-8"
      agent_specific:
        auth_mode: "oauth"
        effort: "xhigh"
        streaming: true
        timeout: 1800
      # Registration calibrates via a fast-fidelity run = the candidate's
      # --debug mode; must fit the debug-tier cap.
      calibration_timeout_seconds: 1200
      max_change_requests: 3

    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-8"
      debug_model: "claude-opus-4-8"
      agent_specific:
        auth_mode: "oauth"
        effort: "xhigh"
        streaming: true
        timeout: 10800

    feedback_generator:
      type: "claude_code"
      model: "claude-opus-4-8"
      debug_model: "claude-opus-4-8"
      agent_specific:
        auth_mode: "oauth"
        effort: "xhigh"
        streaming: true
        timeout: 900

    # Rich routes: attaches reasoning_effort to call sites that never plumbed
    # an effort parameter (repo memory, insight extraction). Mirrors the
    # posttrain deployment: luna at xhigh across all roles, web_search pinned
    # so a stray call can never fall through to a default route.
    models:
      utility:
        model: "gpt-5.6-luna"
        reasoning_effort: "xhigh"
      reasoning:
        model: "gpt-5.6-luna"
        reasoning_effort: "xhigh"
      web_search:
        model: "gpt-5.6-luna"
        reasoning_effort: "xhigh"

    retry:
      max_attempts: 5
      initial_delay_seconds: 5
      max_delay_seconds: 120
      multiplier: 2
      jitter: true

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false

  # Fast system-debugging loop: production mechanics (claude_code coder,
  # same contracts/handler) at ~5x lower latency. Pair with a tiny task,
  # e.g.: -s rel-f1 -t driver-circuit-compete (27-row val/test, seconds-fast
  # evals). Iterations ~15-20 min instead of ~90.
  FAST_DEBUG:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        reasoning_effort: "medium"
        code_debug_tries: 5
        node_expansion_limit: 2
        node_expansion_new_childs_count: 3
        idea_generation_steps: 1
        first_experiment_factor: 1
        experimentation_per_run: 1
        per_step_maximum_solution_count: 6
        exploration_budget_percent: 40
        idea_generation_model: "gpt-5.6-sol"
        idea_generation_ensemble_models:
          - "gpt-5.6-sol"

    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-8"
      agent_specific:
        effort: "medium"
        auth_mode: "oauth"

    models:
      utility: "gpt-5.6-luna"
      reasoning: "gpt-5.6-sol"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false

  # ===========================================
  # Quick smoke testing (rel-f1 scale)
  # ===========================================
  MINIMAL:
    search_strategy:
      type: "benchmark_tree_search"
      params:
        reasoning_effort: "medium"
        code_debug_tries: 2
        node_expansion_limit: 2
        node_expansion_new_childs_count: 3
        idea_generation_steps: 1
        first_experiment_factor: 1
        experimentation_per_run: 1
        per_step_maximum_solution_count: 6
        exploration_budget_percent: 50
        idea_generation_model: "gpt-4.1-mini"
        idea_generation_ensemble_models:
          - "gpt-4.1-mini"

    coding_agent:
      type: "aider"
      model: "gpt-4.1-mini"
      debug_model: "gpt-4.1-mini"

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false

    fetch_huggingface_models: false
