# PostTrainBench Configuration
#
# Kapso runs INSIDE the PostTrainBench apptainer container (agents/kapso/solve.sh),
# where the available credentials are:
#   - CLAUDE_CODE_OAUTH_TOKEN     (Claude Max subscription, exported by solve.sh
#                                  from the harness-provided oauth_token file —
#                                  the upstream claude_non_api mechanism; drives
#                                  the coding agent, feedback generator, and
#                                  Claude ideation roles)
#   - OPENAI_API_KEY              (solve.sh bridges it from CODEX_API_KEY — the
#                                  harness's sanctioned agent-credential channel,
#                                  the same one upstream codex scaffolds run on.
#                                  It drives embeddings and configured utility
#                                  roles; agent
#                                  sessions have it stripped on non-judge tasks
#                                  via env_strip so the workspace looks exactly
#                                  like an official non-judge environment.)
#   - ~/.codex/auth.json          (ChatGPT login file shipped through the
#                                  harness auth.json mechanism; Codex ideation
#                                  roles authenticate through it)
#
# The litellm roles run gpt-5.6-luna: there is no Anthropic API key in this
# deployment (OAuth cannot serve raw API calls), and the OpenAI key above is
# scaffold-owned, so pointing roles at OpenAI is rule-clean. What stays
# forbidden is agents consuming the judge key on judge-scored tasks — that key
# is reserved for evaluate.py, and env_strip never applies there.
#
# Wall-clock budgeting is handled by the runner (orchestrator.solve
# time_budget_minutes), not by this file. Timeouts here are per-session upper
# bounds and are intentionally long: one implementation session may research,
# write a training pipeline, train for a couple of hours and self-evaluate.

default_mode: POSTTRAIN

modes:
  POSTTRAIN:
    ideation_profile: DEFAULT
    search_strategy:
      type: "generic"
      params:
        implementation_model: "claude-opus-4-8"
        auth_mode: "oauth"  # pinned: no Anthropic API key in this deployment — Claude Max OAuth only
        # A single H100 and a hard deadline: never abort the campaign because a
        # knowledge gate backend (weaviate/neo4j/leeroopedia) is unreachable.
        gate_failure_policy: "skip"
        # xhigh for the implementation agent.
        effort: "xhigh"
        # One experiment = write pipeline + train + evaluate. Multi-hour.
        implementation_timeout: 18000
        # Only local, dependency-free gates. `research` and `leeroopedia`
        # need external backends we don't ship in the container. The coding
        # agent still has Claude Code's built-in WebSearch/WebFetch, which is
        # allowed (internet access is unrestricted in the benchmark).
        # Bash-tool clock policy for every Claude session (set-if-absent in
        # the child env — solve.sh's exports keep precedence in-container;
        # this is the config home so local/debug runs match: without it the
        # CLI auto-backgrounds any foreground command at 120s).
        session_env_defaults:
          BASH_DEFAULT_TIMEOUT_MS: "900000"
          BASH_MAX_TIMEOUT_MS: "36000000"
        implementation_gates: ["repo_memory"]

    # Wall-clock shaping, read by benchmarks/posttrain/runner.py (not by
    # kapso core): per-session deadlines scale with the run size so a fixed
    # cap can never dominate a short run (live run #6: the 30-minute
    # ideation cap consumed 77% of a 39-minute budget). The strategy
    # timeouts above act as the ceilings; these fractions/floors shrink
    # them for small budgets. The orchestrator's live budget clamp still
    # bounds every session by what actually remains.
    session_budget:
      implementation_fraction: 0.75
      implementation_min_seconds: 1800
      finalization_reserve_fraction: 0.10
      finalization_reserve_min_minutes: 5
      finalization_reserve_max_minutes: 15
      # Held OUTSIDE the orchestrator budget for the runner's finally-block
      # (final_model verify/copy) before the harness hard-kills the process.
      guard_minutes: 5

    # Iteration admission floor (core reserve gate): refuse to start an
    # iteration when less than this remains outside the finalization
    # reserve. Run #10 (R10-P2-2): with the 60s default, a doomed iteration
    # was admitted at 96.6% budget — ideation ran, the implementation got a
    # 60s slot, and its killed session stranded an eval process on the GPU
    # into the official-eval window. 30 min is the smallest slot in which a
    # train+eval cycle does useful work on this benchmark.
    budget:
      min_iteration_seconds: 1800

    # Litellm roles (repo memory, insight extraction). Rich form: the role's
    # reasoning_effort applies to every call resolved through it — these call
    # sites never plumbed an effort parameter.
    models:
      utility:
        model: "gpt-5.6-luna"
        reasoning_effort: "xhigh"
      reasoning:
        model: "gpt-5.6-luna"
        reasoning_effort: "xhigh"
      # The research gate is disabled; pinned anyway so a stray call can
      # never fall through to a default route.
      web_search:
        model: "gpt-5.6-luna"
        reasoning_effort: "xhigh"
      # Experiment-store semantic search: solutions embedded at write time
      # (orchestrator process, key bridged by solve.sh); the ideation
      # gate's query-side call only works where its process env carries
      # credentials — inside the container it fails loud and agents use
      # top/recent instead.
      embedding: "text-embedding-3-small"
    retry:
      max_attempts: 5
      initial_delay_seconds: 5
      max_delay_seconds: 120
      multiplier: 2
      jitter: true

    coding_agent:
      type: "claude_code"
      model: "claude-opus-4-8"
      debug_model: "claude-opus-4-8"
      agent_specific:
        auth_mode: "oauth"  # pinned: no Anthropic API key in this deployment — Claude Max OAuth only
        effort: "xhigh"
        streaming: true
        timeout: 18000

    feedback_generator:
      type: "claude_code"
      model: "claude-opus-4-8"
      debug_model: "claude-opus-4-8"
      agent_specific:
        auth_mode: "oauth"  # pinned: no Anthropic API key in this deployment — Claude Max OAuth only
        effort: "xhigh"
        streaming: true
        timeout: 900

    knowledge_search:
      type: "kg_llm_navigation"
      enabled: false
